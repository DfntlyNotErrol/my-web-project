<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | My Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <header>
        <p class="login-brand">My Portfolio</p>
        <h1 class="login-title" id="login-title">Login</h1>
        <p class="login-subtitle" id="login-subtitle">Enter your passcode to continue.</p>
      </header>

      <form class="login-form" id="login-form">
        <div class="input-group">
          <label class="edit-label" for="login-passcode">Passcode</label>
          <input type="password" id="login-passcode" class="edit-input" placeholder="••••" required autofocus>
        </div>
        
        <button type="submit" class="btn-save login-btn" id="login-submit">Continue</button>
      </form>

      <div class="login-message" id="login-message"></div>

      <div class="edit-actions">
        <button type="button" class="btn-cancel login-reset" id="login-reset">Reset passcode</button>
      </div>

      <p class="login-note">
        This is a simple client-side login (no server). It’s good for class requirements, not for real security.
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
